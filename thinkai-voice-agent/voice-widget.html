<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkAI — AI Ügyfélszolgálat Demo</title>
    <meta name="description" content="ThinkAI AI ügyfélszolgálat demó — működő AI megoldások vállalkozásoknak">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #050505;
            --bg-secondary: #0c0c0c;
            --bg-card: rgba(18, 18, 18, 0.85);
            --bg-card-hover: rgba(28, 28, 28, 0.9);
            --accent: #00E5CC;
            --accent-glow: rgba(0, 229, 204, 0.25);
            --accent-dim: rgba(0, 229, 204, 0.1);
            --accent-hover: #33ffe6;
            --secondary: #1a1a2e;
            --electric: #6366f1;
            --electric-glow: rgba(99, 102, 241, 0.25);
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.25);
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --text-muted: #525252;
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(0, 229, 204, 0.2);
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Subtle grid background ─────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(0, 229, 204, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 204, 0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(0, 229, 204, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* ── 3-column Layout ──────────────────────── */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }
            .side-panel {
                display: none;
            }
        }

        /* ── Side Panels ──────────────────────────────── */
        .side-panel {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .side-panel:last-child {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        .panel-header {
            padding: 1.2rem 1.2rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
        }

        .panel-header .icon {
            font-size: 1.1rem;
        }

        .panel-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            flex: 1;
        }

        .panel-badge {
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 22px;
            text-align: center;
            font-family: 'Space Grotesk', monospace;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 229, 204, 0.1) transparent;
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 2rem;
            margin-bottom: 0.6rem;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 0.78rem;
            line-height: 1.5;
        }

        /* Calendar items */
        .cal-item {
            background: var(--bg-card-hover);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 0.7rem 0.8rem;
            margin-bottom: 0.5rem;
            animation: slideIn 0.3s ease;
            transition: border-color 0.2s;
        }

        .cal-item:hover {
            border-color: var(--border-hover);
            border-left-color: var(--accent);
        }

        .cal-title {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .cal-meta {
            font-size: 0.72rem;
            color: var(--text-secondary);
            display: flex;
            gap: 0.5rem;
        }

        .cal-duration {
            color: var(--accent);
            font-family: 'Space Grotesk', monospace;
        }

        .cal-attendee {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Email items */
        .email-item {
            background: var(--bg-card-hover);
            border: 1px solid var(--border);
            border-left: 3px solid var(--electric);
            border-radius: 6px;
            padding: 0.7rem 0.8rem;
            margin-bottom: 0.5rem;
            animation: slideIn 0.3s ease;
            transition: border-color 0.2s;
        }

        .email-item:hover {
            border-color: var(--border-hover);
            border-left-color: var(--electric);
        }

        .email-to {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .email-subject {
            font-size: 0.75rem;
            color: var(--accent);
            margin: 0.2rem 0;
        }

        .email-body {
            font-size: 0.72rem;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .email-meta {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .email-status {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            font-family: 'Space Grotesk', monospace;
            letter-spacing: 0.03em;
        }

        .email-status.sent {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
        }

        .email-status.failed {
            background: rgba(239, 68, 68, 0.12);
            color: var(--error);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Center Voice Panel ─────────────────────────── */
        .voice-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* Logo */
        .logo-img {
            height: 80px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 30px var(--accent-glow));
        }

        .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Mic button */
        .mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            color: white;
            font-size: 2.2rem;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow:
                0 0 0 2px var(--accent),
                0 0 40px var(--accent-glow),
                inset 0 0 20px rgba(0, 229, 204, 0.03);
            animation: pulse-idle 3s infinite;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 0 2px var(--accent-hover),
                0 0 60px var(--accent-glow),
                inset 0 0 30px rgba(0, 229, 204, 0.06);
        }

        .mic-btn:active {
            transform: scale(0.98);
        }

        .mic-btn.listening {
            box-shadow: 0 0 0 2px var(--accent), 0 0 30px var(--accent-glow);
            animation: pulse-accent 2s infinite;
        }

        .mic-btn.thinking {
            box-shadow: 0 0 0 2px var(--electric), 0 0 30px var(--electric-glow);
            animation: pulse-electric 1.5s infinite;
        }

        .mic-btn.speaking {
            box-shadow: 0 0 0 2px var(--amber), 0 0 30px var(--amber-glow);
            animation: pulse-amber 2s infinite;
        }

        .mic-btn.connecting {
            box-shadow: 0 0 0 2px var(--text-muted), 0 0 20px rgba(82, 82, 82, 0.2);
            animation: pulse-gray 1s infinite;
        }

        .mic-btn.reconnecting {
            box-shadow: 0 0 0 2px var(--amber), 0 0 20px var(--amber-glow);
            animation: pulse-amber 0.8s infinite;
        }

        @keyframes pulse-idle {
            0%, 100% {
                box-shadow: 0 0 0 2px var(--accent), 0 0 40px var(--accent-glow), inset 0 0 20px rgba(0, 229, 204, 0.03);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 2px var(--accent), 0 0 60px var(--accent-glow), inset 0 0 30px rgba(0, 229, 204, 0.05);
                transform: scale(1.02);
            }
        }

        @keyframes pulse-accent {
            0%, 100% { box-shadow: 0 0 0 2px var(--accent), 0 0 0 0px var(--accent-glow); }
            50% { box-shadow: 0 0 0 2px var(--accent), 0 0 0 18px rgba(0, 229, 204, 0); }
        }

        @keyframes pulse-electric {
            0%, 100% { box-shadow: 0 0 0 2px var(--electric), 0 0 0 0px var(--electric-glow); }
            50% { box-shadow: 0 0 0 2px var(--electric), 0 0 0 14px rgba(99, 102, 241, 0); }
        }

        @keyframes pulse-amber {
            0%, 100% { box-shadow: 0 0 0 2px var(--amber), 0 0 0 0px var(--amber-glow); }
            50% { box-shadow: 0 0 0 2px var(--amber), 0 0 0 18px rgba(245, 158, 11, 0); }
        }

        @keyframes pulse-gray {
            0%, 100% { box-shadow: 0 0 0 2px var(--text-muted), 0 0 0 0px rgba(82, 82, 82, 0.2); }
            50% { box-shadow: 0 0 0 2px var(--text-muted), 0 0 0 14px rgba(82, 82, 82, 0); }
        }

        .mic-btn.speaking::after {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 1.5px solid rgba(245, 158, 11, 0.2);
            animation: ring 2s infinite;
        }

        @keyframes ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .status {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-height: 1.5em;
            transition: all 0.3s;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .status.listening { color: var(--accent); }
        .status.thinking { color: var(--electric); }
        .status.speaking { color: var(--amber); }
        .status.connecting { color: var(--text-muted); }
        .status.reconnecting { color: var(--amber); }
        .status.error { color: var(--error); }

        /* Visualizer */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 36px;
            margin-bottom: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer.active { opacity: 1; }

        .visualizer .bar {
            width: 3px;
            border-radius: 1.5px;
            height: 6px;
            transition: height 0.1s, background 0.3s;
            background: var(--accent);
        }

        .visualizer.agent-speaking .bar {
            background: var(--amber);
        }

        .visualizer.active .bar {
            animation: equalize 0.8s infinite ease-in-out;
        }

        .visualizer.active .bar:nth-child(1) { animation-delay: 0.0s; }
        .visualizer.active .bar:nth-child(2) { animation-delay: 0.1s; }
        .visualizer.active .bar:nth-child(3) { animation-delay: 0.2s; }
        .visualizer.active .bar:nth-child(4) { animation-delay: 0.3s; }
        .visualizer.active .bar:nth-child(5) { animation-delay: 0.4s; }
        .visualizer.active .bar:nth-child(6) { animation-delay: 0.15s; }
        .visualizer.active .bar:nth-child(7) { animation-delay: 0.25s; }

        @keyframes equalize {
            0%, 100% { height: 6px; }
            50% { height: 28px; }
        }

        /* Activity Feed */
        .activity-feed {
            margin-top: 1.5rem;
            padding: 0.6rem;
            background: rgba(12, 12, 12, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 8px;
            border: 1px solid var(--border);
            min-height: 40px;
            max-height: 180px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-align: left;
            overflow-y: auto;
            width: 100%;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 229, 204, 0.08) transparent;
        }

        .activity-feed.visible { display: block; }

        /* Transcript boxes */
        .transcript-box {
            margin-top: 0.75rem;
            padding: 0.6rem 0.8rem;
            background: rgba(12, 12, 12, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 8px;
            border: 1px solid var(--border);
            max-height: 120px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: left;
            overflow-y: auto;
            width: 100%;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 229, 204, 0.08) transparent;
        }
        .transcript-box.visible { display: block; }
        .transcript-box .transcript-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(0, 229, 204, 0.5);
            margin-bottom: 0.3rem;
        }
        .transcript-box .transcript-text {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.4;
        }
        .transcript-box.agent-transcript .transcript-label { color: rgba(168, 130, 255, 0.5); }
        .transcript-box.agent-transcript .transcript-text { color: rgba(168, 130, 255, 0.85); }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.4rem;
            border-radius: 6px;
            margin-bottom: 0.25rem;
            animation: activityIn 0.3s ease;
            transition: background 0.2s;
        }

        .activity-item:hover {
            background: rgba(0, 229, 204, 0.04);
        }

        .activity-item .activity-icon {
            font-size: 0.9rem;
            flex-shrink: 0;
            width: 1.2rem;
            text-align: center;
        }

        .activity-item .activity-text {
            flex: 1;
            line-height: 1.4;
        }

        .activity-item .activity-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            flex-shrink: 0;
            font-family: 'Space Grotesk', monospace;
        }

        .activity-item.status-item { color: var(--text-muted); }
        .activity-item.tool-item { color: var(--accent); }
        .activity-item.result-item { color: var(--text-primary); }
        .activity-item.error-item { color: var(--error); }

        @keyframes activityIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Powered by footer ────────────────────────── */
        .powered-by {
            position: absolute;
            bottom: 1.2rem;
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
        }

        .powered-by a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .powered-by a:hover {
            text-decoration: underline;
        }

        /* ── Live dot ─────────────────────────────────── */
        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- LEFT: Calendar -->
        <div class="side-panel" id="calendarPanel">
            <div class="panel-header">
                <span class="icon">📅</span>
                <h2>Naptár</h2>
                <span class="panel-badge" id="calBadge">0</span>
            </div>
            <div class="panel-content" id="calendarList">
                <div class="empty-state">
                    <div class="empty-icon">📅</div>
                    <p>Nincs még foglalás.<br>Kérd az asszisztenst, hogy foglaljon időpontot!</p>
                </div>
            </div>
        </div>

        <!-- CENTER: Voice -->
        <div class="voice-panel">
            <img class="logo-img" src="/thinkai-logo.png" alt="ThinkAI">
            <div class="subtitle">AI Ügyfélszolgálat Demo</div>

            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <button class="mic-btn" id="micBtn" onclick="toggleConnection()">🎤</button>
            <div class="status" id="status">Kattints ide, és beszélj velem!</div>
            <div class="activity-feed" id="activityFeed"></div>
            <div class="transcript-box" id="userTranscript">
                <div class="transcript-label">🎤 Te mondtad</div>
                <div class="transcript-text" id="userTranscriptText">—</div>
            </div>
            <div class="transcript-box agent-transcript" id="agentTranscript">
                <div class="transcript-label">🤖 Asszisztens</div>
                <div class="transcript-text" id="agentTranscriptText">—</div>
            </div>

            <div class="powered-by">Powered by <a href="https://thinkai.hu" target="_blank">ThinkAI</a></div>
        </div>

        <!-- RIGHT: Emails -->
        <div class="side-panel">
            <div class="panel-header">
                <span class="icon">📧</span>
                <h2>Küldött emailek</h2>
                <span class="panel-badge" id="emailBadge">0</span>
            </div>
            <div class="panel-content" id="emailList">
                <div class="empty-state">
                    <div class="empty-icon">📧</div>
                    <p>Még nem küldtél emailt.<br>Kérd az asszisztenst email küldésre!</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import {
            Room, RoomEvent, Track, ParticipantEvent, ConnectionState,
        } from 'https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.esm.mjs';

        let room = null;
        let connected = false;
        let reconnecting = false;
        let agentSpeaking = false;
        let pollInterval = null;

        const INACTIVITY_TIMEOUT = 20000;
        const COUNTDOWN_SECONDS = 5;
        let inactivityTimer = null;
        let countdownTimer = null;
        let countdownValue = 0;

        function resetInactivity() {
            clearTimeout(inactivityTimer);
            clearInterval(countdownTimer);
            inactivityTimer = null;
            countdownTimer = null;
            if (!connected) return;
            inactivityTimer = setTimeout(startCountdown, INACTIVITY_TIMEOUT - (COUNTDOWN_SECONDS * 1000));
        }

        function startCountdown() {
            countdownValue = COUNTDOWN_SECONDS;
            statusEl.textContent = `Lekapcsolódás ${countdownValue} másodperc múlva...`;
            statusEl.className = 'status reconnecting';
            countdownTimer = setInterval(() => {
                countdownValue--;
                if (countdownValue <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    disconnect();
                    statusEl.textContent = 'Viszlát! Kattints ide, ha újra szükséged van rám!';
                } else {
                    statusEl.textContent = `Lekapcsolódás ${countdownValue} másodperc múlva...`;
                }
            }, 1000);
        }

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const visualizer = document.getElementById('visualizer');
        const activityFeed = document.getElementById('activityFeed');

        function setState(state, message) {
            micBtn.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting');
            statusEl.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting', 'error');
            visualizer.classList.remove('agent-speaking');
            micBtn.classList.add(state);
            statusEl.classList.add(state);
            statusEl.textContent = message;
            if (state === 'speaking') visualizer.classList.add('agent-speaking');
        }

        window.toggleConnection = async function () {
            if (connected) { disconnect(); } else { await connect(); }
        };

        async function fetchWithRetry(url, retries = 3, delayMs = 2000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const resp = await fetch(url);
                    if (resp.ok) return resp;
                } catch (e) { }
                if (i < retries - 1) {
                    await new Promise(r => setTimeout(r, delayMs));
                }
            }
            throw new Error('A szerver nem elérhető. Próbáld újra!');
        }

        async function connect() {
            const MAX_CONNECT_ATTEMPTS = 3;
            for (let attempt = 1; attempt <= MAX_CONNECT_ATTEMPTS; attempt++) {
                setState('connecting', attempt === 1 ? 'Csatlakozás...' : `Újrapróbálom... (${attempt}/${MAX_CONNECT_ATTEMPTS})`);
                try {
                    try { await fetch('/api/health'); } catch (e) { }

                    setState('connecting', 'Csatlakozás...');
                    const resp = await fetchWithRetry('/api/token', 3, 2000);
                    const { token, url } = await resp.json();

                    room = new Room({
                        audioCaptureDefaults: { autoGainControl: true, echoCancellation: true, noiseSuppression: true },
                        reconnectPolicy: { maxRetries: 5, maxRetryDelay: 5000 },
                    });

                    room.on(RoomEvent.TrackSubscribed, (track, pub, participant) => {
                        if (track.kind === Track.Kind.Audio) {
                            const el = track.attach();
                            el.id = `audio-${participant.identity}`;
                            document.body.appendChild(el);
                        }
                    });
                    room.on(RoomEvent.TrackUnsubscribed, (track) => {
                        track.detach().forEach(el => el.remove());
                    });

                    room.on(RoomEvent.TranscriptionReceived, (segments, participant) => {
                        resetInactivity();
                        for (const seg of segments) {
                            if (seg.final) {
                                const isAgent = participant?.identity !== room.localParticipant?.identity;
                                handleTranscription(isAgent ? 'agent' : 'user', seg.text);
                            }
                        }
                    });
                    room.on(RoomEvent.DataReceived, (payload) => {
                        resetInactivity();
                        try {
                            const data = JSON.parse(new TextDecoder().decode(payload));
                            if (data.type === 'transcription' && data.text) handleTranscription(data.role || 'agent', data.text);
                        } catch (e) { }
                    });

                    room.on(RoomEvent.ParticipantConnected, (participant) => {
                        participant.on(ParticipantEvent.IsSpeakingChanged, (speaking) => {
                            resetInactivity();
                            agentSpeaking = speaking;
                            if (speaking) {
                                setState('speaking', 'Beszélek...');
                                visualizer.classList.add('active');
                            } else {
                                setState('listening', 'Hallgatlak...');
                                visualizer.classList.add('active');
                            }
                        });
                    });

                    room.on(RoomEvent.ConnectionStateChanged, (state) => {
                        if (state === ConnectionState.Reconnecting) {
                            reconnecting = true; setState('reconnecting', 'Újracsatlakozás...');
                        } else if (state === ConnectionState.Connected && reconnecting) {
                            reconnecting = false; setState('listening', 'Újra csatlakozva!');
                        }
                    });
                    room.on(RoomEvent.Disconnected, () => { if (!reconnecting) disconnect(); });

                    await room.connect(url, token);
                    await room.localParticipant.setMicrophoneEnabled(true);

                    setState('connecting', 'Várok az asszisztensre...');
                    const agentJoined = await waitForAgent(room, 15000);

                    if (!agentJoined) {
                        console.warn(`Attempt ${attempt}: agent didn't join within timeout`);
                        room.disconnect();
                        room = null;
                        if (attempt < MAX_CONNECT_ATTEMPTS) {
                            await new Promise(r => setTimeout(r, 1000));
                            continue;
                        }
                        throw new Error('Az asszisztens nem érhető el. Próbáld újra!');
                    }

                    connected = true;
                    setState('listening', 'Hallgatlak...');
                    visualizer.classList.add('active');
                    activityFeed.classList.add('visible');
                    addActivity('🟢', 'Csatlakozva — beszélj hozzám!', 'status-item');
                    startPolling();
                    resetInactivity();
                    return;

                } catch (err) {
                    console.error('Connection error:', err);
                    if (room) { room.disconnect(); room = null; }
                    if (attempt >= MAX_CONNECT_ATTEMPTS) {
                        setState('error', 'Hiba: ' + err.message);
                        micBtn.classList.remove('connecting');
                        setTimeout(() => {
                            if (!connected) { statusEl.textContent = 'Kattints ide, és beszélj velem!'; statusEl.className = 'status'; }
                        }, 4000);
                    }
                }
            }
        }

        function waitForAgent(room, timeoutMs) {
            return new Promise((resolve) => {
                for (const [, p] of room.remoteParticipants) {
                    resolve(true);
                    return;
                }
                const timer = setTimeout(() => resolve(false), timeoutMs);
                room.on(RoomEvent.ParticipantConnected, () => {
                    clearTimeout(timer);
                    resolve(true);
                });
            });
        }

        function disconnect() {
            clearTimeout(inactivityTimer);
            clearInterval(countdownTimer);
            inactivityTimer = null;
            countdownTimer = null;
            if (room) { room.disconnect(); room = null; }
            connected = false; reconnecting = false; agentSpeaking = false;
            micBtn.classList.remove('listening', 'thinking', 'speaking', 'connecting', 'reconnecting');
            statusEl.textContent = 'Kattints ide, és beszélj velem!';
            statusEl.className = 'status';
            visualizer.classList.remove('active', 'agent-speaking');
            activityFeed.classList.remove('visible');
            activityFeed.innerHTML = '';
            stopPolling();
        }

        // ── Activity Feed ─────────────────────────────────
        const _toolPatterns = [
            { re: /\b(ellenőrz|megnéz|ránéz)(öm|em)\b.*\bnaptár/i, icon: '📅', text: 'Naptár ellenőrzése...' },
            { re: /\bnaptár(t|at)?\s+(ellenőrz|megnéz|nézem)/i, icon: '📅', text: 'Naptár ellenőrzése...' },
            { re: /\b(most\s+)?(foglalom|lefoglalom|rögzítem)\b/i, icon: '📅', text: 'Időpont foglalása...' },
            { re: /\b(most\s+)?(küldöm|elküldöm|megírom)\b.*\b(email|levél)/i, icon: '📧', text: 'Email küldése...' },
            { re: /\b(email|levél)(t)?\s+(küldöm|írom)/i, icon: '📧', text: 'Email küldése...' },
            { re: /\b(lekérdezem|megnézem)\b.*\bidőjárás/i, icon: '🌤️', text: 'Időjárás lekérdezése...' },
            { re: /\b(most\s+)?(módosítom|megváltoztatom)\b/i, icon: '✏️', text: 'Esemény módosítása...' },
            { re: /\b(most\s+)?(törlöm|lemondom)\b/i, icon: '🗑️', text: 'Esemény törlése...' },
            { re: /\b(keresem|rákeresek|megnézem)\b.*\b(tudásbázis|információ)/i, icon: '🔍', text: 'Információ keresése...' },
        ];

        const _resultPatterns = [
            { re: /sikeresen\s+(lefoglal|elküld|rögzít|módosít|töröl)/i, icon: '✅' },
            { re: /\bfoglalva\b/i, icon: '✅' },
            { re: /\belküldve\b/i, icon: '✅' },
            { re: /\bhiba\b.*\btörtén/i, icon: '❌' },
            { re: /\bütközés\b/i, icon: '⚠️' },
        ];

        let lastToolActivity = 0;

        function addActivity(icon, text, className = '') {
            const div = document.createElement('div');
            div.className = 'activity-item ' + className;
            const now = new Date();
            const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            div.innerHTML = `<span class="activity-icon">${icon}</span><span class="activity-text">${escHtml(text)}</span><span class="activity-time">${time}</span>`;
            activityFeed.appendChild(div);
            activityFeed.scrollTop = activityFeed.scrollHeight;
            while (activityFeed.children.length > 12) activityFeed.removeChild(activityFeed.firstChild);
        }

        function handleTranscription(role, text) {
            if (!text || !text.trim()) return;
            if (role === 'user') {
                const cleaned = text.trim().toLowerCase();
                if (/^[bcdfghjklmnpqrstvwxyz]{2,}$/i.test(cleaned)) return;
                if (['ksznm', 'kszn', 'hm', 'hmm', 'mhm', 'mm', 'sz', 'pszt'].includes(cleaned)) return;
            }
            if (role === 'agent') {
                const t = text.trim();
                if (/^silently[,.]?\s/i.test(t)) return;
                if (/^I'm thinking\b/i.test(t)) return;
                if (/^I need to\b/i.test(t)) return;
                if (/^Therefore,? my response\b/i.test(t)) return;
                if (/^My response will be\b/i.test(t)) return;
                if (/^Let me think\b/i.test(t)) return;
                if (/^I should\b/i.test(t)) return;
                if (/^The user\b/i.test(t)) return;
                if (/^I'll\b/i.test(t)) return;
            }
            text = text.replace(/\[LANG:(HU|EN)\]/gi, '').trim();
            if (!text) return;

            if (role === 'agent') {
                const now = Date.now();
                if (now - lastToolActivity > 3000) {
                    for (const p of _toolPatterns) {
                        if (p.re.test(text)) {
                            addActivity(p.icon, p.text, 'tool-item');
                            lastToolActivity = now;
                            return;
                        }
                    }
                }
                for (const p of _resultPatterns) {
                    if (p.re.test(text)) {
                        const clean = text.replace(/[Tt]ink-éj-áj/g, 'ThinkAI').replace(/éj-áj/g, 'AI');
                        const shortText = clean.length > 60 ? clean.substring(0, 60) + '...' : clean;
                        addActivity(p.icon, shortText, p.icon === '❌' || p.icon === '⚠️' ? 'error-item' : 'result-item');
                        return;
                    }
                }
            }

            if (role === 'user' && connected && !agentSpeaking) setState('thinking', 'Gondolkodom...');

            // Update transcript boxes
            const transcriptBox = role === 'user' ? document.getElementById('userTranscript') : document.getElementById('agentTranscript');
            const transcriptText = role === 'user' ? document.getElementById('userTranscriptText') : document.getElementById('agentTranscriptText');
            if (transcriptBox && transcriptText) {
                transcriptBox.classList.add('visible');
                transcriptText.textContent = text;
            }
        }

        let lastCalHash = '';
        let lastEmailHash = '';

        function startPolling() {
            fetchCalendar();
            fetchEmails();
            pollInterval = setInterval(() => {
                fetchCalendar();
                fetchEmails();
            }, 2000);
        }

        function stopPolling() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        async function fetchCalendar() {
            try {
                const resp = await fetch('/api/calendar');
                const { events } = await resp.json();
                renderCalendar(events || []);
            } catch (e) { }
        }

        async function fetchEmails() {
            try {
                const resp = await fetch('/api/emails');
                const { emails } = await resp.json();
                renderEmails(emails || []);
            } catch (e) { }
        }

        function renderCalendar(events) {
            const container = document.getElementById('calendarList');
            const badge = document.getElementById('calBadge');
            badge.textContent = events.length;
            if (events.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><p>Nincs még foglalás.<br>Kérd az asszisztenst!</p></div>`;
                return;
            }
            const calHash = JSON.stringify(events);
            if (calHash === lastCalHash) return;
            lastCalHash = calHash;
            container.innerHTML = events.map(ev => {
                let dateStr = '';
                try {
                    const d = new Date(ev.start_dt || ev.start);
                    const months = ['jan', 'feb', 'már', 'ápr', 'máj', 'jún', 'júl', 'aug', 'szep', 'okt', 'nov', 'dec'];
                    dateStr = `${months[d.getMonth()]} ${d.getDate()}. ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                } catch (e) { dateStr = ev.start_dt || ev.start || ''; }
                return `<div class="cal-item">
                    <div class="cal-title">${escHtml(ev.title || 'Esemény')}</div>
                    <div class="cal-meta">
                        <span>🕐 ${dateStr}</span>
                        <span class="cal-duration">· ${ev.duration_minutes || 30} perc</span>
                    </div>
                    ${ev.attendee ? `<div class="cal-attendee">👤 ${escHtml(ev.attendee)}</div>` : ''}
                </div>`;
            }).join('');
        }

        function renderEmails(emails) {
            const container = document.getElementById('emailList');
            const badge = document.getElementById('emailBadge');
            badge.textContent = emails.length;
            if (emails.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📧</div><p>Még nem küldtél emailt.<br>Kérd az asszisztenst!</p></div>`;
                return;
            }
            const emailHash = JSON.stringify(emails);
            if (emailHash === lastEmailHash) return;
            lastEmailHash = emailHash;
            container.innerHTML = emails.map(em => {
                let timeStr = '';
                try {
                    const d = new Date(em.sent_at);
                    timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                } catch (e) { timeStr = em.sent_at; }
                const statusClass = em.status === 'sent' ? 'sent' : 'failed';
                const statusText = em.status === 'sent' ? '✓ SENT' : '✗ FAIL';
                return `<div class="email-item">
                    <div class="email-to">📨 ${escHtml(em.to_name)}</div>
                    <div class="email-addr" style="font-size:0.75rem;color:var(--accent);margin-bottom:0.3rem;">${escHtml(em.to_email || '')}</div>
                    <div class="email-subject">${escHtml(em.subject)}</div>
                    <div class="email-body">${escHtml(em.message)}</div>
                    <div class="email-meta">
                        <span>${timeStr}</span>
                        <span class="email-status ${statusClass}">${statusText}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        startPolling();
    </script>
</body>
